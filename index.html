<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ruby Alignment</title>

<link rel="icon" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
<rect width='100' height='100' rx='20' fill='black'/>
<polygon points='50,10 90,35 75,85 25,85 10,35' fill='red'/>
</svg>">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Inter,Arial;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:radial-gradient(circle at top,#120015,#000);
color:#fff;
overflow:hidden;
}

/* Glow Background */
body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%,rgba(255,0,90,.2),transparent 30%),
radial-gradient(circle at 80% 80%,rgba(255,120,0,.2),transparent 30%);
animation:moveBg 10s infinite alternate;
}
@keyframes moveBg{
from{transform:translate(0,0)}
to{transform:translate(40px,20px)}
}

/* Container */
.container{
width:380px;
padding:30px;
border-radius:20px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.1);
box-shadow:0 20px 60px rgba(0,0,0,.5);
animation:fadeIn .6s ease;
}
@keyframes fadeIn{
from{opacity:0;transform:translateY(20px)}
to{opacity:1}
}

.title{
text-align:center;
margin-bottom:25px;
}
.title h1{
font-size:28px;
background:linear-gradient(90deg,#fff,#ff4d6d);
-webkit-background-clip:text;
color:transparent;
}
.title p{
font-size:13px;
color:#aaa;
}

/* Inputs */
.input{
width:100%;
margin-bottom:15px;
padding:12px;
border-radius:12px;
border:1px solid rgba(255,255,255,.1);
background:rgba(255,255,255,.05);
color:#fff;
outline:none;
transition:.3s;
}
.input:focus{
border-color:#ff005c;
box-shadow:0 0 0 2px rgba(255,0,92,.2);
}

/* Button */
button{
width:100%;
padding:12px;
border-radius:12px;
border:none;
background:linear-gradient(135deg,#ff005c,#ff7a18);
color:#fff;
font-weight:bold;
cursor:pointer;
transition:.3s;
}
button:hover{
transform:translateY(-2px);
box-shadow:0 10px 30px rgba(255,0,92,.4);
}

/* Status */
.status{
margin-top:15px;
font-size:13px;
text-align:center;
}

/* System Status */
.system{
margin-top:20px;
padding:12px;
border-radius:12px;
background:rgba(255,255,255,.05);
font-size:12px;
}

/* Loader */
.loader{
border:3px solid transparent;
border-top:3px solid #ff005c;
border-radius:50%;
width:16px;height:16px;
display:inline-block;
animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<body>

<div class="container">

<div class="title">
<h1>Ruby Alignment</h1>
<p>Gestão inteligente de demandas</p>
</div>

<form id="login-form">
<input id="username" class="input" value="admin@ruby.com">
<input id="password" type="password" class="input" value="cah@123">
<button type="submit">Entrar</button>
</form>

<div id="login-result" class="status"></div>

<div class="system">
<div id="system-status">Testando conexão...</div>
</div>

</div>

<script>
const BACKEND_URL = 'https://perfect-creativity-rubya.up.railway.app';

async function testBackendConnection(){
const el=document.getElementById('system-status');
el.innerHTML="🔄 Conectando...";

try{
const r=await fetch(`${BACKEND_URL}/health`);
const d=await r.json();

if(d.status==='healthy'){
el.innerHTML=`🟢 Sistema Online`;
}else{
el.innerHTML=`🟠 Instável`;
}
}catch(e){
el.innerHTML=`🔴 Offline`;
}
}

document.getElementById('login-form').addEventListener('submit',async e=>{
e.preventDefault();

const user=username.value;
const pass=password.value;
const result=document.getElementById('login-result');

result.innerHTML='<span class="loader"></span> Entrando...';

try{
const r=await fetch(`${BACKEND_URL}/login`,{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({username:user,password:pass}),
credentials:'include'
});

const d=await r.json();

if(d.success){
result.innerHTML=`✅ Bem-vindo ${d.user.name}`;
setTimeout(()=>{
window.location.href=`${BACKEND_URL}/dashboard`;
},1000);
}else{
result.innerHTML=`❌ ${d.error}`;
}
}catch(err){
result.innerHTML=`❌ Erro conexão`;
}
});

document.addEventListener('DOMContentLoaded',testBackendConnection);
</script>

</body>
</html>
