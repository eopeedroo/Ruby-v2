{% extends "base.html" %}

{% block title %}Login | Ruby Alignment{% endblock %}

{% block content %}

<div class="min-h-screen flex items-center justify-center px-4 ruby-fade-in">

    <div class="w-full max-w-md ruby-glass rounded-3xl p-8">

        <div class="text-center mb-8">
            <div class="ruby-logo-box mx-auto mb-5"></div>

            <h1 class="text-3xl font-extrabold ruby-text-gradient">
                Ruby Alignment
            </h1>

            <p class="text-sm ruby-muted mt-2">
                Sistema de Gestão Kanban
            </p>
        </div>

        {% if error %}
        <div class="mb-6 px-4 py-3 rounded-2xl bg-red-500/10 border border-red-500/30 text-red-300 text-sm">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <span>{{ error }}</span>
            </div>
        </div>
        {% endif %}

        <form method="POST" class="space-y-5">

            <div>
                <label for="username" class="block text-sm font-semibold ruby-muted mb-2">
                    <i class="fa-solid fa-envelope mr-2"></i>
                    E-mail
                </label>

                <input
                    type="email"
                    id="username"
                    name="username"
                    class="ruby-input px-4 py-3"
                    placeholder="seu@email.com"
                    required
                >
            </div>

            <div>
                <label for="password" class="block text-sm font-semibold ruby-muted mb-2">
                    <i class="fa-solid fa-lock mr-2"></i>
                    Senha
                </label>

                <input
                    type="password"
                    id="password"
                    name="password"
                    class="ruby-input px-4 py-3"
                    placeholder="Sua senha"
                    required
                >
            </div>

            <button type="submit" class="ruby-btn w-full mt-2">
                <i class="fa-solid fa-right-to-bracket"></i>
                Entrar no Sistema
            </button>

        </form>

        {% if session.get('debug') %}
        <div class="mt-5 text-center">
            <a href="/fix-passwords" class="text-sm text-red-300 hover:text-red-100 transition">
                Corrigir Senhas no Banco
            </a>
        </div>
        {% endif %}

        <div class="mt-8 pt-5 border-t border-white/10 text-center">
            <p class="text-xs ruby-muted">
                Ambiente seguro Ruby Alignment
            </p>
        </div>

    </div>

</div>

{% endblock %}
