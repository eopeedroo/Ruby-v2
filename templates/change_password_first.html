{% extends "base.html" %}

{% block content %}

<div class="min-h-screen flex items-center justify-center px-4 ruby-fade-in">

    <div class="w-full max-w-md ruby-glass rounded-3xl p-8">

        <!-- Header -->
        <div class="text-center mb-6">
            <div class="ruby-logo-box mx-auto mb-4"></div>

            <h2 class="text-2xl font-extrabold ruby-text-gradient">
                Alteração obrigatória
            </h2>

            <p class="text-sm ruby-muted mt-2">
                Por segurança, crie uma nova senha para continuar.
            </p>
        </div>

        <!-- Error -->
        {% if error %}
        <div class="mb-4 px-4 py-3 rounded-xl text-sm text-center bg-red-500/10 border border-red-500/30 text-red-300">
            {{ error }}
        </div>
        {% endif %}

        <!-- Form -->
        <form action="{{ url_for('change_password_first') }}" method="POST" class="space-y-5">

            <div>
                <label class="text-sm font-semibold ruby-muted block mb-1">
                    Nova Senha
                </label>
                <input 
                    id="new_password"
                    name="new_password"
                    type="password"
                    required
                    placeholder="Digite sua nova senha"
                    class="ruby-input px-4 py-3"
                >
            </div>

            <div>
                <label class="text-sm font-semibold ruby-muted block mb-1">
                    Confirmar Senha
                </label>
                <input 
                    id="confirm_password"
                    name="confirm_password"
                    type="password"
                    required
                    placeholder="Confirme a senha"
                    class="ruby-input px-4 py-3"
                >
            </div>

            <button type="submit" class="ruby-btn w-full mt-4">
                Salvar nova senha
            </button>

        </form>

        <!-- Footer -->
        <p class="text-center text-xs ruby-muted mt-6">
            Sistema seguro Ruby Alignment
        </p>

    </div>
</div>

{% endblock %}
