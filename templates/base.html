<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Ruby Alignment | Kanban Workspace{% endblock %}</title>

    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' x2='1' y1='0' y2='1'%3E%3Cstop stop-color='%23ff005c'/%3E%3Cstop offset='1' stop-color='%23ff7a18'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='24' fill='%23120714'/%3E%3Cpath d='M50 10 86 34 70 82H30L14 34Z' fill='url(%23g)'/%3E%3Cpath d='M29 35h42L58 68H42Z' fill='white' opacity='.92'/%3E%3C/svg%3E">

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">

    <style>
        :root {
            --ruby-primary: #ff005c;
            --ruby-secondary: #ff7a18;
            --ruby-dark: #07040a;
            --ruby-panel: rgba(255,255,255,.075);
            --ruby-border: rgba(255,255,255,.12);
            --ruby-text: #f8fafc;
            --ruby-muted: rgba(255,255,255,.62);
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            min-height: 100vh;
            font-family: Inter, Arial, Helvetica, sans-serif;
            color: var(--ruby-text);
            background: var(--ruby-dark);
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -5;
            background:
                radial-gradient(circle at 20% 12%, rgba(255, 0, 92, .22), transparent 30%),
                radial-gradient(circle at 85% 20%, rgba(255, 122, 24, .16), transparent 32%),
                radial-gradient(circle at 55% 92%, rgba(120, 0, 255, .16), transparent 38%),
                linear-gradient(135deg, #08040b 0%, #120715 55%, #050307 100%);
            animation: rubyAmbient 14s ease-in-out infinite alternate;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -4;
            pointer-events: none;
            opacity: .11;
            background-image:
                linear-gradient(rgba(255,255,255,.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,.07) 1px, transparent 1px);
            background-size: 48px 48px;
            mask-image: linear-gradient(to bottom, #000, transparent 90%);
        }

        @keyframes rubyAmbient {
            from {
                filter: hue-rotate(0deg) brightness(1);
            }
            to {
                filter: hue-rotate(14deg) brightness(1.12);
            }
        }

        .ruby-glass {
            background: var(--ruby-panel);
            border: 1px solid var(--ruby-border);
            backdrop-filter: blur(22px);
            box-shadow: 0 30px 85px rgba(0,0,0,.24);
        }

        .ruby-gradient {
            background: linear-gradient(135deg, var(--ruby-primary), var(--ruby-secondary));
        }

        .ruby-text-gradient {
            color: transparent;
            background: linear-gradient(90deg, #fff, #ff8aa9, #ff7a18);
            -webkit-background-clip: text;
            background-clip: text;
        }

        .ruby-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 18px;
            border-radius: 16px;
            color: #fff;
            font-weight: 800;
            background: linear-gradient(135deg, var(--ruby-primary), var(--ruby-secondary));
            transition: .3s ease;
            box-shadow: 0 16px 45px rgba(255, 0, 92, .24);
        }

        .ruby-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 22px 60px rgba(255, 0, 92, .35);
        }

        .ruby-input {
            width: 100%;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,.12);
            background: rgba(255,255,255,.065);
            color: #fff;
            outline: none;
            transition: .3s ease;
        }

        .ruby-input:focus {
            border-color: rgba(255, 122, 24, .55);
            box-shadow: 0 0 0 5px rgba(255,0,92,.08);
        }

        .ruby-muted {
            color: var(--ruby-muted);
        }

        .ruby-card-hover {
            transition: .35s ease;
        }

        .ruby-card-hover:hover {
            transform: translateY(-8px);
            border-color: rgba(255, 122, 24, .38);
            background: rgba(255,255,255,.095);
        }

        .ruby-fade-in {
            animation: rubyFadeIn .65s ease both;
        }

        @keyframes rubyFadeIn {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .ruby-logo-box {
            width: 52px;
            height: 52px;
            display: grid;
            place-items: center;
            border-radius: 18px;
            background: linear-gradient(135deg, var(--ruby-primary), var(--ruby-secondary));
            box-shadow: 0 0 42px rgba(255, 0, 92, .35);
        }

        .ruby-logo-box::before {
            content: "◆";
            font-size: 28px;
            color: #fff;
        }

        .ruby-status-online {
            color: #80f0b9;
        }

        .ruby-status-online::before {
            content: "";
            display: inline-block;
            width: 8px;
            height: 8px;
            margin-right: 6px;
            border-radius: 50%;
            background: #31d68b;
            box-shadow: 0 0 14px rgba(49,214,139,.78);
            animation: rubyPing 1.4s infinite;
        }

        @keyframes rubyPing {
            0%, 100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.45);
                opacity: .45;
            }
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>

<body>
    {% block content %}{% endblock %}

    {% block scripts %}{% endblock %}
</body>
</html>
